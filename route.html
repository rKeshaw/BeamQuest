<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BeamQuest — Route</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
:root{
  --cyan:#00f0ff;
  --purple:#8a2be2;
  --red:#ff0055;
  --text:#1E293B;
  --muted:#475569;
  --line:rgba(255, 255, 255, 0.4);
}
*{box-sizing:border-box}
html,body{min-height:100%}
body{
  margin:0;
  color:var(--text);
  background: linear-gradient(-45deg, #FF6B6B, #4ECDC4, #FFE66D, #6B5B95);
  background-size: 400% 400%;
  animation: aurora 20s ease infinite;
  font-family: 'Quicksand', sans-serif;
  overflow: hidden;
}
@keyframes aurora {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
.bg-orb{position:fixed;border-radius:999px;filter:blur(100px);opacity:.7;pointer-events:none;z-index:-1; mix-blend-mode: overlay;}
.orb-1{width:320px;height:320px;left:-80px;top:-40px;background:#fff}
.orb-2{width:400px;height:400px;right:-110px;top:20%;background:#fffdba}
.orb-3{width:380px;height:380px;left:25%;bottom:-140px;background:#fff}

.laser-wrap { position: fixed; inset: 0; pointer-events: none; z-index: -1; mix-blend-mode: overlay;}
.laser { position: absolute; height: 12px; background: linear-gradient(90deg, transparent, #fff 50%, transparent); filter: blur(4px); opacity: 0.9; }
.laser-cyan { width: 150vw; top: 15%; left: -50vw; transform: rotate(15deg); animation: ray 6s linear infinite; }
.laser-pink { width: 120vw; bottom: 20%; left: -10vw; transform: rotate(-20deg); animation: ray 8s linear infinite; animation-delay: -2s; }
.laser-purple { width: 80vw; top: -10%; left: 40%; transform: rotate(70deg); animation: ray 5s linear infinite; animation-delay: -1s; }
@keyframes ray { 0% { transform: translateX(-100vw) rotate(15deg); } 100% { transform: translateX(100vw) rotate(15deg); } }

.prism { position: fixed; border: 2px solid rgba(255,255,255,0.6); backdrop-filter: blur(16px) saturate(180%); box-shadow: 0 20px 40px rgba(0,0,0,0.1), inset 0 0 20px rgba(255,255,255,0.6); background: linear-gradient(135deg,rgba(255,255,255,0.4),rgba(255,255,255,0.05)); border-radius: 40px; z-index: -1; animation: spin 20s cubic-bezier(0.4, 0, 0.2, 1) infinite alternate; }
.prism-1 { width: 180px; height: 180px; right: 12%; top: 18%; transform: rotate(45deg); }
.prism-2 { width: 140px; height: 140px; left: 15%; bottom: 20%; clip-path: polygon(50% 0%, 0% 100%, 100% 100%); background: linear-gradient(to top, rgba(255,255,255,0.6), transparent); border-radius: 0; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.15);}
@keyframes spin { to { transform: rotate(360deg) scale(1.1); } }

.app{

}
.page{animation:fade .8s cubic-bezier(0.16, 1, 0.3, 1)}
@keyframes fade{from{opacity:0;transform:translateY(30px) scale(0.95)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes float { 0%, 100% { transform: translateY(0px) scale(1); } 50% { transform: translateY(-30px) scale(1.05); } }
.bg-orb { animation: float 15s ease-in-out infinite; }
.orb-2 { animation-delay: -5s; }

.page-exit { animation: pageExit 0.5s ease forwards !important; pointer-events: none; }

}

.page-header{display:flex;justify-content:space-between;gap:18px;align-items:flex-end;margin-bottom:18px;flex-wrap:wrap}
.route-actions{display:flex;gap:12px;flex-wrap:wrap}
.route-layout{display:grid;grid-template-columns:minmax(0,1fr) 360px;gap:18px; flex: 1; min-height: 0;}
.board-card, .route-card { padding: 18px; display: flex; flex-direction: column; min-height: 0; }
.board-top{display:flex;justify-content:center;align-items:center;gap:12px;margin-bottom:14px;flex-shrink:0;color:#1E293B;font-size:1.2rem;}
.board-wrap{position:relative; flex: 1; display:flex; align-items:center; justify-content:center; min-height: 0; padding:50px 20px 20px 50px;}
.board-inner{position:relative; width:100vh; max-width:100%; max-height:100%; aspect-ratio:1/1; display:flex;}
.axis-x{position:absolute;bottom:calc(100% + 8px);left:0;right:0;display:grid;grid-template-columns:repeat(3,1fr);color:#1E293B;font-size:1.5rem;font-weight:800;font-family:'Comfortaa',cursive;}

.axis-y{position:absolute;right:calc(100% + 8px);top:0;bottom:0;display:grid;grid-template-rows:repeat(3,1fr);align-items:center;color:#1E293B;font-size:1.5rem;font-weight:800;font-family:'Comfortaa',cursive;}
.board{width:100%;height:100%;display:grid;grid-template-columns:repeat(3,1fr);border-radius:32px;overflow:hidden;border:2px solid rgba(255,255,255,0.8);background:rgba(255,255,255,0.5); box-shadow: inset 0 0 60px rgba(255,255,255,0.8), 0 20px 40px rgba(0,0,0,0.1); position:relative; z-index:2; backdrop-filter: blur(40px);}
.board::before { content:''; position:absolute; inset:-50%; background:conic-gradient(from 0deg, transparent, rgba(255,255,255,0.3), transparent); animation:spin 12s linear infinite; z-index:0; pointer-events:none;}

.cell.end{background:rgba(255,107,107,0.9); box-shadow: inset 0 0 30px rgba(255,255,255,0.5); border-color: #fff; z-index: 1;}
.marker{position:absolute;top:12px;left:12px;width:36px;height:36px;border-radius:12px;display:grid;place-items:center;color:#fff;font-family:'Quicksand',sans-serif;font-size:1.5rem;font-weight:800;box-shadow:0 10px 20px rgba(0,0,0,.15); animation: cellPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;}
.marker.path{background:linear-gradient(135deg, rgba(255,255,255,0.9), rgba(255,255,255,0.7)); color:#4ECDC4; border:2px solid #4ECDC4;}
.marker.start{background:linear-gradient(135deg, #4ECDC4, #2A9D8F); border:2px solid #fff;}

.route-card h3{margin:0 0 14px;font-size:1.3rem; display:flex; align-items:center; gap: 10px; flex-shrink:0; font-family:'Comfortaa',cursive; color:#1E293B;}
.route-card h3::before { content: ""; width: 12px; height: 12px; border-radius: 50%; background: #FF6B6B; display: inline-block; box-shadow: 0 0 15px rgba(255,107,107,0.6); animation: pulse 2s infinite;}
.route-list{display:flex; flex-direction:column; gap:12px; flex:1; overflow-y:auto; padding-right:8px; margin-bottom:12px;}
.route-step{border-radius:16px;border:2px solid rgba(255,255,255,0.8);background:rgba(255,255,255,0.5);padding:14px 18px; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);}
.route-step:hover { background:rgba(255,255,255,0.8); border-color:#fff; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
.route-step .top{display:flex;justify-content:space-between;gap:14px;align-items:center;font-weight:800;font-family:'Quicksand',sans-serif; text-transform:uppercase; font-size: 1rem; letter-spacing: 0.5px; color:#1E293B;}
.route-step .cell-name{display:block;margin-top:6px;color:#4ECDC4;font-size:1.3rem;font-family:'Comfortaa',cursive; font-weight:700; text-shadow:0 1px 2px rgba(0,0,0,0.05);}
.route-step.is-start{background:rgba(78,205,196,0.3); border-color:#fff;}
.route-step.is-end{background:rgba(255,107,107,0.2); border-color:#fff;}
.step-badge{display:inline-flex;justify-content:center;align-items:center;min-width:34px;padding:8px 12px;border-radius:12px;color:#fff;font-size:.85rem;font-weight:800;letter-spacing:.1em; box-shadow: 0 4px 10px rgba(0,0,0,0.15);}
.timer-badge{display:inline-flex;align-items:center;justify-content:center;font-family:'Comfortaa',cursive;font-size:1.6rem;font-weight:700;padding:0 36px;border-radius:999px;background:rgba(255,255,255,0.4);border:2px solid #fff;color:#1E293B;backdrop-filter:blur(10px);letter-spacing:2px;}
.timer-badge.danger{background:#ef4444;color:#fff;border-color:#fff;animation:pulseGlow 0.5s infinite alternate;box-shadow: 0 0 20px rgba(239,68,68,0.5);}
@media (max-width: 1080px){.route-layout{grid-template-columns:1fr; flex-direction:column; overflow:auto;} body{overflow:auto;} .app{height:auto;}} 
@media (max-width: 720px){.app{width:min(100% - 20px, 1180px);padding-top:10px}.cell{min-height:88px}.timer-badge{font-size:1.3rem;padding:0 24px;}}

</head>
<body>
  <div class="laser-wrap">
    <div class="laser laser-cyan" style="animation-name: rayColorCyan;"></div>
    <div class="laser laser-pink" style="animation-name: rayColorPink;"></div>
    <div class="laser laser-purple" style="animation-name: rayColorPurple;"></div>
  </div>
  <style>
    @keyframes rayColorCyan { 0% { transform: translateX(-100vw) rotate(15deg); opacity: 0; } 10%, 90% { opacity: 0.8; } 100% { transform: translateX(100vw) rotate(15deg); opacity: 0; } }
    @keyframes rayColorPink { 0% { transform: translateX(100vw) rotate(-20deg); opacity: 0; } 10%, 90% { opacity: 0.8; } 100% { transform: translateX(-100vw) rotate(-20deg); opacity: 0; } }
    @keyframes rayColorPurple { 0% { transform: translate(-50vw, -100vh) rotate(70deg); opacity: 0; } 10%, 90% { opacity: 0.8; } 100% { transform: translate(50vw, 100vh) rotate(70deg); opacity: 0; } }
  </style>

  <div class="prism prism-1"></div>
  <div class="prism prism-2"></div>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>

  <main class="app">
    <header class="page-header">
      <div>
        <p class="eyebrow">Step 2</p>
        <h2 id="routeTitle">Route</h2>
        <p id="routeSubtitle" class="subtext" style="margin-top:10px;"></p>
      </div>
      <div class="route-actions">
        <div id="gameTimer" class="timer-badge">00:00</div>
        <button id="startBtn" class="primary" style="background:#22c55e; box-shadow:0 15px 35px rgba(34,197,94,0.3);">Start</button>
        <button id="restartBtn" class="primary">New game</button>
      </div>
    </header>

    <div class="route-layout">
      <section class="board-card card">
        <div class="board-top">
          <strong>3×3 board</strong>
        </div>
        <div class="board-wrap">
          <div class="board-inner">
            <div class="axis-x"><span>A</span><span>B</span><span>C</span></div>
            <div class="axis-y"><span>1</span><span>2</span><span>3</span></div>
            <div id="board" class="board"></div>
          </div>
        </div>
      </section>

      <aside class="route-card card">
        <h3>Route sequence</h3>
        <div id="routeList" class="route-list"></div>
      </aside>
    </div>
  </main>

  <script>

const DIFFICULTIES = {
  Easy: { color: "#22c55e", length: 3, description: "Short, direct routes with fewer turns." },
  Medium: { color: "#3b82f6", length: 4, description: "Moderate routes with more routing choices." },
  Hard: { color: "#f59e0b", length: 5, description: "Longer paths with tighter routing." },
  Expert: { color: "#a855f7", length: 6, description: "Most constrained routes and less obvious shapes." }
};

const cells = ["A1","B1","C1","A2","B2","C2","A3","B3","C3"];
const coords = Object.fromEntries(cells.map(cell => [cell, { x: cell.charCodeAt(0) - 65, y: Number(cell[1]) - 1 }]));
const coordToCell = Object.fromEntries(Object.entries(coords).map(([cell, p]) => [`${p.x},${p.y}`, cell]));

const adj = Object.fromEntries(cells.map(cell => [cell, []]));
for (const cell of cells) {
  const { x, y } = coords[cell];
  for (const [dx, dy] of [[1,0],[-1,0],[0,1],[0,-1]]) {
    const nx = x + dx, ny = y + dy;
    if (nx >= 0 && nx < 3 && ny >= 0 && ny < 3) {
      adj[cell].push(coordToCell[`${nx},${ny}`]);
    }
  }
}

function allPaths(length) {
  const paths = [];
  function dfs(path) {
    if (path.length === length) {
      paths.push([...path]);
      return;
    }
    for (const nxt of adj[path[path.length - 1]]) {
      if (!path.includes(nxt)) {
        path.push(nxt);
        dfs(path);
        path.pop();
      }
    }
  }
  for (const start of cells) dfs([start]);
  return paths;
}

const ops = {
  id: ({ x, y }) => ({ x, y }),
  r90: ({ x, y }) => ({ x: 2 - y, y: x }),
  r180: ({ x, y }) => ({ x: 2 - x, y: 2 - y }),
  r270: ({ x, y }) => ({ x: y, y: 2 - x }),
  mx: ({ x, y }) => ({ x, y: 2 - y }),
  my: ({ x, y }) => ({ x: 2 - x, y }),
  d1: ({ x, y }) => ({ x: y, y: x }),
  d2: ({ x, y }) => ({ x: 2 - y, y: 2 - x })
};
const symOps = ["id","r90","r180","r270","mx","my","d1","d2"];

function transformPath(path, opName) {
  const op = ops[opName];
  return path.map(cell => {
    const p = op(coords[cell]);
    return coordToCell[`${p.x},${p.y}`];
  });
}
function canonical(path) {
  return symOps.map(op => transformPath(path, op).join("-")).sort()[0];
}
function uniquePaths(length) {
  const reps = new Map();
  for (const path of allPaths(length)) {
    const key = canonical(path);
    if (!reps.has(key)) reps.set(key, path);
  }
  return [...reps.values()];
}
function buildDeck() {
  return Object.fromEntries(
    Object.entries(DIFFICULTIES).map(([name, spec]) => [name, uniquePaths(spec.length)])
  );
}
function randomItem(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}
function saveSelection(difficulty, path) {
  localStorage.setItem("beamquest_state", JSON.stringify({ difficulty, path, ts: Date.now() }));
}
function loadSelection() {
  try {
    return JSON.parse(localStorage.getItem("beamquest_state") || "null");
  } catch {
    return null;
  }
}

const board = document.getElementById("board");
const routeList = document.getElementById("routeList");
const routeTitle = document.getElementById("routeTitle");
const routeSubtitle = document.getElementById("routeSubtitle");
const restartBtn = document.getElementById("restartBtn");
const startBtn = document.getElementById("startBtn");
const gameTimer = document.getElementById("gameTimer");

const deck = buildDeck();

const TIMER_MAP = {
  Easy: 60,
  Medium: 150,
  Hard: 300,
  Expert: 600
};

let timerInterval;
let currentDifficulty = "Easy";

function initTimerDisplay(difficulty) {
  let initialTime = TIMER_MAP[difficulty] || 60;
  const m = Math.floor(initialTime / 60);
  const s = initialTime % 60;
  gameTimer.textContent = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
}

function startTimer(difficulty) {
  let timeLeft = TIMER_MAP[difficulty] || 60;
  
  if (timerInterval) clearInterval(timerInterval);
  gameTimer.classList.remove("danger");
  
  function update() {
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      gameTimer.textContent = "00:00";
      gameTimer.classList.add("danger");
      return;
    }
    const m = Math.floor(timeLeft / 60);
    const s = timeLeft % 60;
    gameTimer.textContent = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    
    if (timeLeft <= 10) {
      gameTimer.classList.add("danger");
    } else {
      gameTimer.classList.remove("danger");
    }
    timeLeft--;
  }
  
  update();
  timerInterval = setInterval(update, 1000);
}

function renderBoard() {
  board.innerHTML = "";
  const labels = ["A1","B1","C1","A2","B2","C2","A3","B3","C3"];
  for (const label of labels) {
    const cell = document.createElement("div");
    cell.className = "cell";
    cell.dataset.cell = label;
    cell.innerHTML = `<span class="marker" hidden></span><span>${label}</span>`;
    board.appendChild(cell);
  }
}

async function renderRoute(path) {
  const oldSvg = document.getElementById("boardLines");
  if (oldSvg) oldSvg.remove();

  [...board.querySelectorAll(".cell")].forEach(cell => {
    const marker = cell.querySelector(".marker");
    cell.classList.remove("path", "start", "end", "anim-active");
    marker.hidden = true;
    marker.className = "marker";
    marker.textContent = "";
  });

  routeList.innerHTML = "";

  for (let idx = 0; idx < path.length; idx++) {
    const label = path[idx];
    const cell = [...board.children].find(c => c.dataset.cell === label);
    const marker = cell.querySelector(".marker");

    let arrow = "●";
    if (idx < path.length - 1) {
      const x = coords[label].x, y = coords[label].y;
      const nx = coords[path[idx+1]].x, ny = coords[path[idx+1]].y;
      if (nx > x) arrow = "→";
      else if (nx < x) arrow = "←";
      else if (ny > y) arrow = "↓";
      else if (ny < y) arrow = "↑";
    }

    if (idx === 0) {
      cell.classList.add("start");
      marker.hidden = false;
      marker.classList.add("start");
      marker.textContent = arrow;
    } else if (idx === path.length - 1) {
      cell.classList.add("end", "anim-active");
      marker.hidden = false;
      marker.classList.add("end");
      marker.textContent = arrow;
    } else {
      cell.classList.add("path");
      marker.hidden = false;
      marker.classList.add("path");
      marker.textContent = arrow;
    }

    const row = document.createElement("div");
    row.className = "route-step";
    if (idx === 0) row.classList.add("is-start");
    if (idx === path.length - 1) row.classList.add("is-end");

    const badgeBg = idx === 0 ? "#22c55e" : idx === path.length - 1 ? "#ef4444" : "#3b82f6";
    const tag = idx === 0 ? "Start" : idx === path.length - 1 ? "End" : arrow;
    const stepLabel = idx === 0 ? "Start Node" : idx === path.length - 1 ? "End Node" : `Path Node`;

    row.innerHTML = `
      <div class="top">
        <span>${stepLabel}</span>
        <span class="step-badge" style="background:${badgeBg}; font-size:1.1rem;">${tag}</span>
      </div>
      <span class="cell-name">${label}</span>
    `;
    routeList.appendChild(row);
  }
}

function updateViewFromSaved() {
  const data = loadSelection();
  if (!data || !data.difficulty || !Array.isArray(data.path)) {
    window.location.href = "difficulty.html";
    return;
  }

  routeTitle.textContent = `${data.difficulty} route`;
  const flavorTexts = [
    "Generating optical pathways... optimizing for maximum efficiency.",
    "Calibrating prism alignments and evaluating trajectory matrices.",
    "Simulating quantum photon routing through the symmetry grid.",
    "Establishing laser refraction sequence. Ensure vector stability.",
    "Transmitting energetic light pulses through designated crystalline nodes.",
    "Bending light through the void. Calculating minimal distance vectors."
  ];
  routeSubtitle.textContent = randomItem(flavorTexts);
  
  // Start the rendering animation
  renderRoute(data.path);
  currentDifficulty = data.difficulty;
  initTimerDisplay(data.difficulty);
}

startBtn.addEventListener("click", () => {
  startBtn.style.display = "none";
  startTimer(currentDifficulty);
});

restartBtn.addEventListener("click", () => window.location.href = "difficulty.html");

renderBoard();
updateViewFromSaved();
  </script>
</body>
</html>
