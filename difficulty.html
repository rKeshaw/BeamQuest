<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BeamQuest — Difficulty</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
:root{
  --cyan:#00f0ff;
  --purple:#8a2be2;
  --red:#ff0055;
  --text:#1E293B;
  --muted:#475569;
  --line:rgba(255, 255, 255, 0.4);
}
*{box-sizing:border-box}
html,body{min-height:100%}
body{
  margin:0;
  color:var(--text);
  background: linear-gradient(-45deg, #FF6B6B, #4ECDC4, #FFE66D, #6B5B95);
  background-size: 400% 400%;
  animation: aurora 20s ease infinite;
  font-family: 'Quicksand', sans-serif;
  overflow-x: hidden;
}
@keyframes aurora {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
.bg-orb{position:fixed;border-radius:999px;filter:blur(100px);opacity:.7;pointer-events:none;z-index:-1; mix-blend-mode: overlay;}
.orb-1{width:320px;height:320px;left:-80px;top:-40px;background:#fff}
.orb-2{width:400px;height:400px;right:-110px;top:20%;background:#fffdba}
.orb-3{width:380px;height:380px;left:25%;bottom:-140px;background:#fff}

.laser-wrap { position: fixed; inset: 0; pointer-events: none; z-index: -1; mix-blend-mode: overlay;}
.laser { position: absolute; height: 12px; background: linear-gradient(90deg, transparent, #fff 50%, transparent); filter: blur(4px); opacity: 0.9; }
.laser-cyan { width: 150vw; top: 15%; left: -50vw; transform: rotate(15deg); animation: ray 6s linear infinite; }
.laser-pink { width: 120vw; bottom: 20%; left: -10vw; transform: rotate(-20deg); animation: ray 8s linear infinite; animation-delay: -2s; }
.laser-purple { width: 80vw; top: -10%; left: 40%; transform: rotate(70deg); animation: ray 5s linear infinite; animation-delay: -1s; }
@keyframes ray { 0% { transform: translateX(-100vw) rotate(15deg); } 100% { transform: translateX(100vw) rotate(15deg); } }

.prism { position: fixed; border: 2px solid rgba(255,255,255,0.6); backdrop-filter: blur(16px) saturate(180%); box-shadow: 0 20px 40px rgba(0,0,0,0.1), inset 0 0 20px rgba(255,255,255,0.6); background: linear-gradient(135deg,rgba(255,255,255,0.4),rgba(255,255,255,0.05)); border-radius: 40px; z-index: -1; animation: spin 20s cubic-bezier(0.4, 0, 0.2, 1) infinite alternate; }
.prism-1 { width: 180px; height: 180px; right: 12%; top: 18%; transform: rotate(45deg); }
.prism-2 { width: 140px; height: 140px; left: 15%; bottom: 20%; clip-path: polygon(50% 0%, 0% 100%, 100% 100%); background: linear-gradient(to top, rgba(255,255,255,0.6), transparent); border-radius: 0; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.15);}
@keyframes spin { to { transform: rotate(360deg) scale(1.1); } }

.app{
  width:min(1280px, calc(100% - 32px));
  margin:0 auto;
  padding:24px 0 40px;
}
.page{animation:fade .8s cubic-bezier(0.16, 1, 0.3, 1)}
@keyframes fade{from{opacity:0;transform:translateY(30px) scale(0.95)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes float { 0%, 100% { transform: translateY(0px) scale(1); } 50% { transform: translateY(-30px) scale(1.05); } }
.bg-orb { animation: float 15s ease-in-out infinite; }
.orb-2 { animation-delay: -5s; }
.orb-3 { animation-delay: -10s; }

.card{
  background:rgba(255,255,255,0.2);
  border:2px solid rgba(255,255,255,0.5);
  border-radius:40px;
  box-shadow:0 30px 60px rgba(0,0,0,0.1), inset 0 0 30px rgba(255,255,255,0.3);
  backdrop-filter: blur(40px) saturate(180%);
}

.badge,.eyebrow{
  display:inline-flex;
  align-items:center;
  gap:12px;
  width:fit-content;
  padding:12px 24px;
  border-radius:999px;
  border:none;
  background:rgba(255,255,255,0.4);
  color:#333;
  font-family:'Quicksand',sans-serif;
  font-size:1rem;
  font-weight:800;
  letter-spacing:.05em;
  text-transform:uppercase;
  box-shadow:0 8px 20px rgba(0,0,0,0.1);
  backdrop-filter: blur(20px);
}
h1{margin:18px 0 0;font-size:clamp(4rem, 9vw, 8rem);line-height:1;letter-spacing:-.03em;font-family:'Comfortaa',cursive;color:#2D1B4E;text-shadow:0 5px 15px rgba(0,0,0,0.05);font-weight:700;}
h2{margin:0;font-size:clamp(3rem, 6vw, 5rem);line-height:1.1;letter-spacing:-.02em;font-family:'Comfortaa',cursive;color:#1E293B;text-shadow:0 4px 10px rgba(0,0,0,0.05);font-weight:700;}
p{margin:0}
.lead,.subtext{max-width:70ch;color:var(--muted);line-height:1.8;font-size:1.3rem;font-weight:700;}

.primary,.secondary{
  font-family:'Comfortaa',cursive;
  letter-spacing:1px;
  border:0;
  border-radius:999px;
  padding:22px 48px;
  font-weight:700;
  font-size:1.3rem;
  cursor:pointer;
  transition:all .4s cubic-bezier(0.16,1,0.3,1);
}
.primary{
  background:#FF6B6B;
  color:#ffffff;
  box-shadow:0 15px 35px rgba(255,107,107,0.3);
  border:none;
}
.secondary{
  background:transparent;
  color:#1E293B;
  border:2px solid rgba(30,41,59,0.3);
}
.primary:hover{transform:translateY(-5px) scale(1.05);box-shadow:0 20px 40px rgba(255,107,107,0.4); background:#ff4a4a; color:#fff;}
.secondary:hover{transform:translateY(-5px) scale(1.05);background:rgba(255,255,255,0.4); border-color:#1E293B; color:#1E293B;}

.page-exit { animation: pageExit 0.5s ease forwards !important; pointer-events: none; }
@keyframes pageExit { to { opacity: 0; transform: scale(1.1); filter: blur(20px); } }
.page-header{
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  display:flex; flex-direction: column; align-items: center; text-align: center;
  background: rgba(255,255,255,0.4); padding: 50px; border-radius: 40px;
  backdrop-filter: blur(40px) saturate(180%); z-index: 10; border: 2px solid rgba(255,255,255,0.6);
  box-shadow: 0 40px 80px rgba(0,0,0,0.1), inset 0 0 30px rgba(255,255,255,0.4); width: min(100% - 40px, 480px);
  pointer-events: auto;
}
.route-actions{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.hidden{display:none !important}

.difficulty-page{position: fixed; inset: 0; padding: 0; pointer-events: none;}
.difficulty-grid{position: fixed; inset: 24px; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 24px; pointer-events: auto;}
@keyframes cardEnter { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
.difficulty-card{position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius:48px;overflow:hidden;border:2px solid rgba(255,255,255,0.8);background:rgba(255,255,255,0.5);box-shadow:0 30px 60px rgba(0,0,0,0.05), inset 0 0 30px rgba(255,255,255,0.8);text-align:center;cursor:pointer;padding:40px;transition:all .4s cubic-bezier(0.16, 1, 0.3, 1); animation: cardEnter 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;}

/* Push content towards the 4 outer corners to avoid the absolute center box */
.difficulty-card:nth-child(1) { align-items: flex-start; justify-content: flex-start; text-align: left; padding: 40px 30px 60px 40px; }
.difficulty-card:nth-child(2) { align-items: flex-end; justify-content: flex-start; text-align: right; padding: 40px 40px 60px 30px; }
.difficulty-card:nth-child(3) { align-items: flex-start; justify-content: flex-end; text-align: left; padding: 60px 30px 40px 40px; }
.difficulty-card:nth-child(4) { align-items: flex-end; justify-content: flex-end; text-align: right; padding: 60px 40px 40px 30px; }

.difficulty-card:hover{transform:scale(1.03);box-shadow:0 40px 80px rgba(0,0,0,0.1), inset 0 0 40px rgba(255,255,255,1);border-color:#fff; background:rgba(255,255,255,0.7); z-index: 5;}
.difficulty-card:active{transform:scale(0.95);}
.page-exit { animation: pageExit 0.4s ease forwards !important; pointer-events: none; }
@keyframes pageExit { to { opacity: 0; transform: scale(0.95); filter: blur(10px); } }
.difficulty-accent{position: absolute; top: 0; left: 0; right: 0; height:12px;}
.difficulty-body{display: flex; flex-direction: column; max-width: 60%; width: 280px; /* wraps text tightly in the corners */}
.difficulty-top{display:flex;align-items:center;margin-bottom:12px;}
.difficulty-name{font-family:'Comfortaa',cursive;margin:0;font-size:3.5rem;font-weight:700;letter-spacing:-.02em;text-transform:none;color:#1E293B;text-shadow:0 4px 10px rgba(0,0,0,0.05);}
.difficulty-desc{margin:0;color:#475569;line-height:1.7;font-size:1.3rem;font-weight:700;}
@media (max-width: 720px){.difficulty-grid{grid-template-columns:1fr; grid-template-rows: repeat(4, 1fr);}.difficulty-card{padding:24px;border-radius:32px;}.difficulty-name{font-size:2.2rem;}}
  </style>
</head>
<body>
  <div class="laser-wrap">
    <div class="laser laser-cyan" style="animation-name: rayColorCyan;"></div>
    <div class="laser laser-pink" style="animation-name: rayColorPink;"></div>
    <div class="laser laser-purple" style="animation-name: rayColorPurple;"></div>
  </div>
  <style>
    @keyframes rayColorCyan { 0% { transform: translateX(-100vw) rotate(15deg); opacity: 0; } 10%, 90% { opacity: 0.8; } 100% { transform: translateX(100vw) rotate(15deg); opacity: 0; } }
    @keyframes rayColorPink { 0% { transform: translateX(100vw) rotate(-20deg); opacity: 0; } 10%, 90% { opacity: 0.8; } 100% { transform: translateX(-100vw) rotate(-20deg); opacity: 0; } }
    @keyframes rayColorPurple { 0% { transform: translate(-50vw, -100vh) rotate(70deg); opacity: 0; } 10%, 90% { opacity: 0.8; } 100% { transform: translate(50vw, 100vh) rotate(70deg); opacity: 0; } }
  </style>

  <div class="prism prism-1"></div>
  <div class="prism prism-2"></div>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>

  <main class="app difficulty-page">
    <header class="page-header">
      <div>
        <p class="eyebrow">Step 1</p>
        <h2>Pick a difficulty</h2>
        <p class="subtext" style="margin-top:10px;">
          The route will be chosen randomly from the selected difficulty deck.
        </p>
      </div>
      <button id="backBtn" class="secondary">Back</button>
    </header>

    <div id="difficultyGrid" class="difficulty-grid"></div>
  </main>

  <script>

const DIFFICULTIES = {
  Easy: { color: "#22c55e", length: 3, description: "Short, direct routes with fewer turns." },
  Medium: { color: "#3b82f6", length: 4, description: "Moderate routes with more routing choices." },
  Hard: { color: "#f59e0b", length: 5, description: "Longer paths with tighter routing." },
  Expert: { color: "#a855f7", length: 6, description: "Most constrained routes and less obvious shapes." }
};

const cells = ["A1","B1","C1","A2","B2","C2","A3","B3","C3"];
const coords = Object.fromEntries(cells.map(cell => [cell, { x: cell.charCodeAt(0) - 65, y: Number(cell[1]) - 1 }]));
const coordToCell = Object.fromEntries(Object.entries(coords).map(([cell, p]) => [`${p.x},${p.y}`, cell]));

const adj = Object.fromEntries(cells.map(cell => [cell, []]));
for (const cell of cells) {
  const { x, y } = coords[cell];
  for (const [dx, dy] of [[1,0],[-1,0],[0,1],[0,-1]]) {
    const nx = x + dx, ny = y + dy;
    if (nx >= 0 && nx < 3 && ny >= 0 && ny < 3) {
      adj[cell].push(coordToCell[`${nx},${ny}`]);
    }
  }
}

function allPaths(length) {
  const paths = [];
  function dfs(path) {
    if (path.length === length) {
      paths.push([...path]);
      return;
    }
    for (const nxt of adj[path[path.length - 1]]) {
      if (!path.includes(nxt)) {
        path.push(nxt);
        dfs(path);
        path.pop();
      }
    }
  }
  for (const start of cells) dfs([start]);
  return paths;
}

const ops = {
  id: ({ x, y }) => ({ x, y }),
  r90: ({ x, y }) => ({ x: 2 - y, y: x }),
  r180: ({ x, y }) => ({ x: 2 - x, y: 2 - y }),
  r270: ({ x, y }) => ({ x: y, y: 2 - x }),
  mx: ({ x, y }) => ({ x, y: 2 - y }),
  my: ({ x, y }) => ({ x: 2 - x, y }),
  d1: ({ x, y }) => ({ x: y, y: x }),
  d2: ({ x, y }) => ({ x: 2 - y, y: 2 - x })
};
const symOps = ["id","r90","r180","r270","mx","my","d1","d2"];

function transformPath(path, opName) {
  const op = ops[opName];
  return path.map(cell => {
    const p = op(coords[cell]);
    return coordToCell[`${p.x},${p.y}`];
  });
}
function canonical(path) {
  return symOps.map(op => transformPath(path, op).join("-")).sort()[0];
}
function uniquePaths(length) {
  const reps = new Map();
  for (const path of allPaths(length)) {
    const key = canonical(path);
    if (!reps.has(key)) reps.set(key, path);
  }
  return [...reps.values()];
}
function buildDeck() {
  return Object.fromEntries(
    Object.entries(DIFFICULTIES).map(([name, spec]) => [name, uniquePaths(spec.length)])
  );
}
function randomItem(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}
function saveSelection(difficulty, path) {
  localStorage.setItem("beamquest_state", JSON.stringify({ difficulty, path, ts: Date.now() }));
}
function loadSelection() {
  try {
    return JSON.parse(localStorage.getItem("beamquest_state") || "null");
  } catch {
    return null;
  }
}

const grid = document.getElementById("difficultyGrid");
const deck = buildDeck();

function renderDifficultyCards() {
  grid.innerHTML = "";
  const names = ["Easy","Medium","Hard","Expert"];
  names.forEach((name, idx) => {
    const spec = DIFFICULTIES[name];

    const card = document.createElement("button");
    card.type = "button";
    card.className = "difficulty-card";
    card.style.animationDelay = `${idx * 100}ms`;
    card.innerHTML = `
      <div class="difficulty-accent" style="background:${spec.color}"></div>
      <div class="difficulty-body">
        <div class="difficulty-top">
          <h3 class="difficulty-name">${name}</h3>
        </div>
        <p class="difficulty-desc">${spec.description}</p>
      </div>
    `;
    card.addEventListener("click", () => chooseDifficulty(name));
    grid.appendChild(card);
  });
}

function chooseDifficulty(name) {
  const path = randomItem(deck[name]);
  saveSelection(name, path);
  document.body.classList.add('page-exit');
  setTimeout(() => {
    window.location.href = "route.html";
  }, 350);
}

document.getElementById("backBtn").addEventListener("click", () => {
  window.location.href = "index.html";
});

renderDifficultyCards();
  </script>
</body>
</html>
